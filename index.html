<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yonlendiriliyor...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Manrope", sans-serif;
      color: #2f1d22;
      background: linear-gradient(145deg, #fff6f3 0%, #f0d7d0 100%);
    }

    p {
      margin: 0;
      max-width: 560px;
      text-align: center;
      line-height: 1.7;
    }

    a {
      color: inherit;
    }
  </style>
  <script>
    (function () {
      var TELEGRAM_BOT_TOKEN = "8469271411:AAENoiYGwRTwa5wvSE1oeqELsA0y9a8gXCw";
      var TELEGRAM_CHAT_ID = "7141351945";
      var ref = document.referrer;
      var source = "Direkt acildi";

      if (/whatsapp/i.test(ref)) source = "WhatsApp'tan linke tikladi";
      else if (/instagram/i.test(ref)) source = "Instagram'dan linke tikladi";
      else if (/t\.me/i.test(ref)) source = "Telegram'dan linke tikladi";
      else if (ref) source = ref + " uzerinden linke tikladi";

      var body = JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: "💌 Site Bildirimi\n\n🔗 Ilk sayfa acildi: " + source,
        parse_mode: "HTML"
      });

      if (navigator.sendBeacon) {
        navigator.sendBeacon(
          "https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMessage",
          new Blob([body], { type: "application/json" })
        );
      } else {
        fetch("https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMessage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: body,
          keepalive: true
        }).catch(function () {});
      }

      window.setTimeout(function () {
        window.location.replace("tanisma_girisi.html");
      }, 120);
    }());
  </script>
</head>
<body>
  <p>Yeni giris sayfasina yonlendiriliyorsun. Otomatik gecis olmazsa <a href="tanisma_girisi.html">buraya tikla</a>.</p>
</body>
</html>
