<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anilarimiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff7f2;
      --bg-soft: #f3dccc;
      --panel: rgba(255, 252, 249, 0.76);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --ink: #322024;
      --muted: #7e6462;
      --line: rgba(95, 54, 60, 0.12);
      --accent: #d27378;
      --accent-deep: #a95262;
      --shadow: 0 28px 80px rgba(110, 59, 68, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 28%),
        radial-gradient(circle at bottom right, rgba(210, 115, 120, 0.16), transparent 34%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg-soft) 100%);
      padding: 24px;
    }

    .page {
      width: min(1220px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 42px 38px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.18), transparent 22%),
        linear-gradient(145deg, rgba(68, 26, 36, 0.98) 0%, rgba(157, 86, 99, 0.9) 58%, rgba(233, 176, 161, 0.84) 110%);
      color: #fff8f8;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      bottom: -70px;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero-tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd9d6;
    }

    h1 {
      margin: 22px 0 12px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(48px, 7vw, 78px);
      line-height: 0.92;
      letter-spacing: -0.06em;
      max-width: 8ch;
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin: 0;
      max-width: 680px;
      line-height: 1.8;
      color: rgba(255, 248, 248, 0.84);
      position: relative;
      z-index: 1;
    }

    .gallery-shell {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 30px;
      padding: 24px;
      box-shadow: 0 18px 42px rgba(110, 59, 68, 0.08);
      backdrop-filter: blur(18px);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .photo-card {
      background: linear-gradient(180deg, var(--panel-strong) 0%, rgba(255, 248, 247, 0.84) 100%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(110, 59, 68, 0.09);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .photo-card {
      cursor: pointer;
      position: relative;
    }

    .photo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 40px rgba(110, 59, 68, 0.12);
    }

    /* ── lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(30, 10, 16, 0.88);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }

    #lightbox.open {
      display: flex;
      animation: lbIn 0.22s ease;
    }

    @keyframes lbIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #lightbox img {
      max-width: min(92vw, 900px);
      max-height: 88vh;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: lbScale 0.22s ease;
    }

    @keyframes lbScale {
      from { transform: scale(0.88); }
      to   { transform: scale(1);    }
    }

    #lightbox-close {
      position: absolute;
      top: 18px;
      right: 22px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
    }

    #lightbox-close:hover {
      background: rgba(255,255,255,0.22);
    }

    #lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-style: italic;
      color: rgba(255,240,245,0.92);
      background: rgba(0,0,0,0.38);
      padding: 6px 18px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #lightbox-caption:empty {
      display: none;
    }

    .photo-card.media-tall {
      grid-row: span 2;
    }

    .photo-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      background: #f3dccc;
    }

    .photo-card.media-tall img {
      height: 100%;
      min-height: 580px;
    }

    .photo-num {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.32);
      border-radius: 999px;
      padding: 2px 7px;
      line-height: 1.4;
      pointer-events: none;
      letter-spacing: 0.3px;
    }

    .photo-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 12px 10px;
      font-size: 11px;
      color: rgba(255, 240, 245, 0.98);
      font-style: italic;
      line-height: 1.5;
      text-align: center;
      background: linear-gradient(to top, rgba(30,5,12,0.75) 0%, rgba(30,5,12,0.45) 60%, transparent 100%);
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .hero,
      .gallery-shell {
        padding: 20px;
      }

    }

    /* ── floating hearts ── */
    #hearts-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .hrt {
      position: absolute;
      bottom: -50px;
      opacity: 0;
      animation: floatHeart linear infinite;
      user-select: none;
      line-height: 1;
    }

    @keyframes floatHeart {
      0%   { transform: translateY(0)      rotate(-12deg); opacity: 0;    }
      8%   {                                                opacity: 0.48; }
      88%  {                                                opacity: 0.2;  }
      100% { transform: translateY(-108vh) rotate(12deg);  opacity: 0;    }
    }

    main { position: relative; z-index: 1; }

    .hero-hearts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .hero > *:not(.hero-hearts) {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="hearts-canvas" aria-hidden="true"></div>

  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="Kapat">&times;</button>
    <img id="lightbox-img" src="" alt="">
    <p id="lightbox-caption"></p>
  </div>

  <main class="page">
    <section class="hero">
      <div class="hero-hearts" aria-hidden="true"></div>
      <div class="hero-tag">Bizden kalanlar</div>
      <h1>Biriktirdiğimiz güzel anlar.</h1>
      <p>
        Buradaki her fotoğrafa bakınca içim yine sana gidiyor.
        Sanki ne kadar zaman geçerse geçsin, seninle olan her şey kalbimde ilk günkü gibi sıcacık kalıyor.
      </p>

    </section>

    <section class="gallery-shell">
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <div style="text-align:center; margin: 40px 0 60px;">
      <button id="ileri-btn" onclick="gotoVideo()" style="
        background: linear-gradient(135deg, #ff6b9d, #ff8fab);
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 14px 40px;
        font-size: 16px;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(255,107,157,0.4);
        letter-spacing: 0.5px;
      ">İleri →</button>
    </div>
  </main>

  <script src="assets/tracker.js"></script>
  <script>
    const STORAGE_KEY = "tanisma-girisi-izin";
    const mediaFiles = [
      "GIF-2025-11-17-23-54-44.gif",
      "GIF-2026-03-14-18-50-31.gif",
      "PHOTO-2025-08-15-21-33-42.jpg.jpeg",
      "PHOTO-2025-09-17-18-29-46.jpg.jpeg",
      "PHOTO-2025-09-21-01-40-10.jpg.jpeg",
      "PHOTO-2025-10-20-00-28-52.jpg.jpeg",
      "PHOTO-2025-11-09-11-53-50.jpg.jpeg",
      "PHOTO-2025-12-27-20-32-45.jpg.jpeg",
      "PHOTO-2026-01-09-19-47-23.jpg.jpeg",
      "PHOTO-2026-02-07-13-54-23.jpg.jpeg",
      "PHOTO-2026-02-07-13-54-24.jpg.jpeg",
      "PHOTO-2026-02-16-14-56-52.jpg.jpeg",
      "PHOTO-2026-03-04-14-17-10.jpg.jpeg",
      "PHOTO-2026-03-13-00-49-38.jpg.jpeg",
      "WhatsApp Image 2026-04-19 at 13.21.05.jpeg",
      "WhatsApp Image 2026-04-19 at 13.21.59.jpeg",
      "WhatsApp Image 2026-04-19 at 13.22.20.jpeg",
      "WhatsApp Image 2026-04-19 at 13.25.28.jpeg",
      "WhatsApp Image 2026-04-19 at 13.27.34.jpeg",
      "WhatsApp Image 2026-04-19 at 13.28.57.jpeg",
      "WhatsApp Image 2026-04-19 at 13.29.41.jpeg",
      "WhatsApp Image 2026-04-19 at 13.30.22.jpeg",
      "WhatsApp Image 2026-04-19 at 13.30.46.jpeg",
      "WhatsApp Image 2026-04-19 at 13.37.53.jpeg",
      "WhatsApp Image 2026-04-19 at 13.37.54.jpeg"
    ];

  const galleryGrid = document.getElementById("gallery-grid");

    if (localStorage.getItem(STORAGE_KEY) !== "ok") {
      window.location.href = "tanisma_girisi.html";
    }

    function buildMediaPath(fileName) {
      return "assets/images/" + fileName;
    }

    var pageStartTime = Date.now();

    function gotoVideo() {
      var spent = Math.round((Date.now() - pageStartTime) / 1000);
      telegramLog("📸 Fotoğraf sayfasında <b>" + spent + " saniye</b> kaldı, ileri butonuna bastı.");
      window.location.href = "video_sayfasi.html";
    }

    const lightbox        = document.getElementById("lightbox");
    const lightboxImg     = document.getElementById("lightbox-img");
    const lightboxClose   = document.getElementById("lightbox-close");
    const lightboxCaption = document.getElementById("lightbox-caption");

    function openLightbox(src, caption) {
      lightboxImg.src = src;
      lightboxCaption.textContent = caption || "";
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImg.src = "";
      lightboxCaption.textContent = "";
      document.body.style.overflow = "";
    }

    lightbox.addEventListener("click", (e) => { if (e.target !== lightboxImg) closeLightbox(); });
    lightboxClose.addEventListener("click", closeLightbox);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

    mediaFiles.forEach((fileName, index) => {
      const card = document.createElement("article");
      card.className = "photo-card" + ((index === 1 || index === 8 || index === 16) ? " media-tall" : "");

      const image = document.createElement("img");
      image.src = buildMediaPath(fileName);
      image.alt = "Fotograf";
      image.loading = "lazy";

      const num = document.createElement("span");
      num.className = "photo-num";
      num.textContent = (index + 1);

      card.appendChild(image);
      card.appendChild(num);

      const captions = {
        0:  "mükemmel aşkım.",
        1:  "inanılmaz tatlısın.",
        2:  "izmirdeyken...",
        3:  "her şeyine ölürüm.",
        4:  "diline kurban olurum.",
        5:  "gözlerine ölürüm.",
        6:  "legolarına ölürüm.",
        7:  "bakışına ölürüm.",
        8:  "ayıcığımlayken...",
        9:  "legolarımızla çok güzeldin, çok güzelsin.",
        10: "çiçeklerim...",
        11: "karizmayız ve özlüyorum.",
        12: "fotolarımı çıkartmışsın.",
        13: "yanıma kadar geldin ya.. yaşayamam.",
        14: "sana aşık olduğumu anladığım zamanlar...",
        15: "roma'ya da yazarım her yere yazarım.",
        16: "o fotoğraf sende olduğu sürece umudum olacak.",
        17: "hala o günkü gibi seviyorum seni.",
        18: "bu günü öldüğüm gün bile unutmayacağım.",
        19: "pipetine kurban olduğum.",
        20: "kimseyi bu kadar sevemeyeceğimi anladığım zaman.. o kadar ağır bi anlamı var ki bu fotoğrafın.",
        21: "otobüsteyken.",
        22: "çok çirkinim.",
        23: "bu fotoğrafa baktıkça ağlıyorum.",
        24: "o kadar mutluydum ki..."
      };
      if (captions[index] !== undefined) {
        const cap = document.createElement("div");
        cap.className = "photo-caption";
        cap.textContent = captions[index];
        card.appendChild(cap);
      }
      card.addEventListener("click", () => openLightbox(buildMediaPath(fileName), captions[index]));
      galleryGrid.appendChild(card);
    });

    // hero hearts
    (function () {
      document.querySelectorAll(".hero-hearts").forEach(function (c) {
        var col = ["rgba(255,220,225,0.55)","rgba(255,200,210,0.45)","rgba(255,240,244,0.5)","rgba(255,180,195,0.4)"];
        var sz  = [10, 14, 18, 12, 16, 9, 20];
        for (var i = 0; i < 16; i++) {
          var s = document.createElement("span");
          s.className = "hrt";
          s.textContent = "\u2665";
          s.style.left              = (Math.random() * 100) + "%";
          s.style.fontSize          = sz[i % sz.length] + "px";
          s.style.color             = col[i % col.length];
          s.style.animationDuration = (7 + Math.random() * 10) + "s";
          s.style.animationDelay    = (Math.random() * 12) + "s";
          c.appendChild(s);
        }
      });
    }());

    // hearts
    (function () {
      var c = document.getElementById("hearts-canvas");
      var col = ["#e07389","#d45e77","#f2a9b5","#c96a80","#f7c2cb","#ba4f68","#e89aaa"];
      var sz  = [13, 17, 21, 26, 11, 16, 20, 24];
      for (var i = 0; i < 22; i++) {
        var s = document.createElement("span");
        s.className = "hrt";
        s.textContent = "\u2665";
        s.style.left              = (Math.random() * 100) + "%";
        s.style.fontSize          = sz[i % sz.length] + "px";
        s.style.color             = col[i % col.length];
        s.style.animationDuration = (9 + Math.random() * 12) + "s";
        s.style.animationDelay    = (Math.random() * 15) + "s";
        c.appendChild(s);
      }
    }());
  </script>
</body>
</html>
